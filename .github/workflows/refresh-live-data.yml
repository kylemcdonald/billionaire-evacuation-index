name: Refresh Live Data

on:
  workflow_dispatch:
  schedule:
    - cron: "17,47 * * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WRANGLER_OAUTH_CONFIG: ${{ secrets.WRANGLER_OAUTH_CONFIG }}
  PUBLIC_BUCKET: billionaire-evacuation-index-public
  STATE_BUCKET: billionaire-evacuation-index-state

concurrency:
  group: refresh-live-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          npm ci
          pip install -r requirements.txt

      - name: Configure Wrangler OAuth
        run: |
          mkdir -p "$HOME/.config/.wrangler/config"
          printf '%s' "$WRANGLER_OAUTH_CONFIG" > "$HOME/.config/.wrangler/config/default.toml"

      - name: Restore deployment state
        run: |
          mkdir -p data
          npx wrangler r2 object get "${STATE_BUCKET}/ews.sqlite" --file data/ews.sqlite --remote

      - name: Refresh latest heatmap
        run: python3 scripts/update_latest_heatmap.py

      - name: Export published dashboard snapshot
        run: node scripts/export_dashboard_snapshot.js --output tmp/dashboard.json

      - name: Upload deployment state
        run: npx wrangler r2 object put "${STATE_BUCKET}/ews.sqlite" --file data/ews.sqlite --remote

      - name: Publish live snapshot
        run: |
          npx wrangler r2 object put "${PUBLIC_BUCKET}/dashboard.json" \
            --file tmp/dashboard.json \
            --remote \
            --content-type application/json \
            --cache-control "public, max-age=300"
